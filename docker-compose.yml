services:
  thoughtful-frame:
    build: .
    container_name: thoughtful-frame
    ports:
      - "8421:8000"
    environment:
      - IMMICH_BASE_URL=${IMMICH_BASE_URL:-http://192.168.1.180:8080/api}
      - IMMICH_API_KEY=${IMMICH_API_KEY}
      - DATABASE_PATH=${DATABASE_PATH:-/data/thoughtful_frame.db}
    volumes:
      - ${DATA_PATH:-./data}:/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    network_mode: bridge

volumes:
  thoughtful-frame-data:
    driver: local
